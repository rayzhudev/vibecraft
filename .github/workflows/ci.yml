name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate
        run: bun run check

      - name: Unit tests
        run: bun run test:unit

  mcp:
    runs-on: ubuntu-latest
    needs: quality
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright dependencies
        run: bunx playwright install --with-deps

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: MCP tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" bun run test:mcp

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright dependencies
        run: bunx playwright install --with-deps

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" bun run test:e2e
